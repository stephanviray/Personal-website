<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Stephan Viray</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #fafaf8;
            color: #1a1a18;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px;
        }
        .thanks {
            max-width: 480px;
        }
        .check {
            font-size: 3rem;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        h1 em {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
        }
        p {
            color: #555550;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        a {
            display: inline-block;
            padding: 14px 32px;
            background: #1a1a18;
            color: #fafaf8;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: opacity 0.3s ease;
        }
        a:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="thanks">
        <div class="check">✓</div>
        <h1>Message <em>sent.</em></h1>
        <p>Thank you for reaching out! I'll get back to you as soon as possible.</p>
        <a href="index.html">← Back to Portfolio</a>
    </div>
</body>
</html>
